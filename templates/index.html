<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>株主優待管理</title>

<link rel="manifest"
      href="/static/manifest.json">

<link rel="apple-touch-icon"
      href="/static/icons/icon-192.png">

<meta name="theme-color"
      content="#0b0b12">

<style>

*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    min-height:100%;
    background:#08080d;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    z-index:-1;
    background:
        radial-gradient(circle at 20% 10%, rgba(255,140,60,.18), transparent 32%),
        radial-gradient(circle at 80% 85%, rgba(255,80,80,.12), transparent 34%),
        linear-gradient(180deg,#0b0b12,#07070b);
}

.app{
    width:100%;
    max-width:430px;
    margin:0 auto;
    padding:24px 18px 120px;
}

.header{
    margin-bottom:24px;
}

.header h1{
    margin:0;
    font-size:28px;
    font-weight:900;
}

.header p{
    margin:8px 0 0;
    color:#aaa;
    font-size:13px;
}

.section{
    display:none;
}

.section.active{
    display:block;
}

.card{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    border-radius:24px;
    padding:16px;
    margin-bottom:14px;
    box-shadow:0 12px 30px rgba(0,0,0,.28);
    backdrop-filter:blur(14px);
}

.summary{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.summary-label{
    color:#aaa;
    font-size:12px;
    margin-bottom:8px;
}

.summary-value{
    font-size:26px;
    font-weight:900;
}

.summary-sub{
    margin-top:5px;
    color:#ffb36b;
    font-size:12px;
}

.section-title{
    margin:26px 0 12px;
    font-size:17px;
    font-weight:800;
}

.ticket{
    display:flex;
    gap:12px;
    align-items:center;
}

.ticket-icon{
    width:54px;
    height:54px;
    border-radius:18px;
    display:grid;
    place-items:center;
    font-size:24px;
    background:linear-gradient(135deg,#ff9a3d,#ff5f57);
    flex-shrink:0;
}

.ticket-main{
    flex:1;
    min-width:0;
}

.ticket-name{
    font-weight:800;
    font-size:15px;
    margin-bottom:5px;
}

.ticket-meta{
    color:#aaa;
    font-size:12px;
    line-height:1.5;
}

.ticket-amount{
    font-size:16px;
    font-weight:900;
}

.badge{
    display:inline-block;
    margin-top:7px;
    padding:4px 9px;
    border-radius:999px;
    background:rgba(255,255,255,.1);
    font-size:11px;
}

.delete-link{
    display:inline-block;
    margin-top:8px;
    color:#ff9a9a;
    font-size:12px;
    text-decoration:none;
    font-weight:700;
}

input,select,textarea{
    width:100%;
    padding:14px;
    border-radius:15px;
    border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.08);
    color:white;
    margin:7px 0 14px;
    outline:none;
    font-family:inherit;
}

textarea{
    min-height:86px;
    resize:vertical;
}

select option{
    color:#000;
}

button{
    width:100%;
    padding:14px;
    border:0;
    border-radius:16px;
    background:linear-gradient(135deg,#ff9a3d,#ff5f57);
    color:white;
    font-size:15px;
    font-weight:900;
    cursor:pointer;
}

.bottom-nav{
    position:fixed;
    left:50%;
    bottom:16px;
    transform:translateX(-50%);
    width:calc(100% - 30px);
    max-width:430px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    padding:10px;
    border-radius:26px;
    background:rgba(18,18,25,.94);
    border:1px solid rgba(255,255,255,.1);
    backdrop-filter:blur(18px);
}

.nav-item{
    text-align:center;
    color:#aaa;
    padding:10px 0;
    border-radius:18px;
    font-size:11px;
    cursor:pointer;
}

.nav-item.active{
    background:rgba(255,145,70,.24);
    color:white;
    font-weight:800;
}

</style>

</head>

<body>

<div class="app">

<div class="header">

    <h1>株主優待管理</h1>

    <p>
        残高・期限・画像読込で管理
    </p>

</div>


<!-- HOME -->

<div id="home" class="section active">

    <div class="summary">

        <div class="card">

            <div class="summary-label">
                合計残高
            </div>

            <div class="summary-value">
                ¥{{ "{:,}".format(total_balance) }}
            </div>

            <div class="summary-sub">
                {{ ticket_count }}件
            </div>

        </div>

        <div class="card">

            <div class="summary-label">
                登録数
            </div>

            <div class="summary-value">
                {{ ticket_count }}
            </div>

            <div class="summary-sub">
                優待管理中
            </div>

        </div>

    </div>

</div>


<!-- PUSH -->

<div class="card">

    <div class="section-title">
        通知
    </div>

    <button id="pushButton" type="button">
        通知を有効化
    </button>

</div>


<!-- NAV -->

<div class="bottom-nav">

    <div class="nav-item active"
         data-target="home">

        🏠<br>
        ホーム

    </div>

</div>

</div>


<script>

document.addEventListener("DOMContentLoaded", () => {

    const pushButton =
        document.getElementById("pushButton");

    if (pushButton) {

        pushButton.addEventListener(
            "click",
            subscribePush
        );

    }

});


async function subscribePush() {

    alert("通知設定を開始します");

    try {

        if (!("serviceWorker" in navigator)) {

            alert("Service Worker未対応");
            return;

        }

        if (!("Notification" in window)) {

            alert("通知未対応ブラウザ");
            return;

        }

        const permission =
            await Notification.requestPermission();

        if (permission !== "granted") {

            alert("通知が拒否されました");
            return;

        }

        const registration =
            await navigator.serviceWorker.ready;

        const subscription =
            await registration.pushManager.subscribe({

                userVisibleOnly: true,

                applicationServerKey:
                    urlBase64ToUint8Array(
                        {{ vapid_public_key | tojson }}
                    )

            });

        const res = await fetch(
            "/save-subscription",
            {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify(subscription)

            }
        );

        if (!res.ok) {

            alert("通知保存失敗");
            return;

        }

        alert("通知を有効化しました！");

    } catch (e) {

        alert("通知設定エラー: " + e.message);

        console.error(e);

    }

}


function urlBase64ToUint8Array(base64String) {

    const padding =
        "=".repeat((4 - base64String.length % 4) % 4);

    const base64 =
        (base64String + padding)
            .replace(/-/g, "+")
            .replace(/_/g, "/");

    const rawData = window.atob(base64);

    return Uint8Array.from(

        [...rawData].map(char =>
            char.charCodeAt(0)
        )

    );

}


if ("serviceWorker" in navigator) {

    window.addEventListener("load", ()=>{

        navigator.serviceWorker.register(
            "/static/service-worker.js"
        );

    });

}

</script>

</body>
</html>
